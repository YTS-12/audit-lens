domain_rules:
- rule: 감가상각방법 변경은 일반적으로 회계정책 변경이 아니라 회계추정의 변경으로 처리한다.
  ksa:
  - 540
  kifrs:
  - 1008
  - 1016
  - 1038
  혼동주의:
  - 감가상각방법 변경을 회계정책 변경으로 단정하지 말 것
  - 내용연수·잔존가치·상각방법 변경은 전진 반영되는 회계추정 변경 여부를 우선 판단
- rule: 리스이용자는 단기리스·소액자산리스 예외를 제외하고 사용권자산과 리스부채를 인식한다.
  ksa:
  - 315
  - 330
  - 540
  kifrs:
  - 1116
  혼동주의:
  - 리스이용자 회계에서는 운용/금융 구분보다 사용권자산·리스부채 인식 판단이 우선
  - 리스제공자 회계는 운용리스·금융리스 분류가 유지됨
- rule: 고객과의 계약 수익은 5단계 모형(계약식별→수행의무→거래가격→배분→이행 시 인식)으로 판단한다.
  ksa:
  - 240
  - 315
  - 330
  - 540
  kifrs:
  - 1115
  혼동주의:
  - 진행기준/한시점은 수행의무가 기간에 걸쳐 이행되는지로 판단
  - 투입법·산출법은 진행률 측정방법이지 별도 기준이 아님
- rule: 재고자산은 원가와 순실현가능가치 중 낮은 금액으로 측정하며, 원가흐름은 선입선출·가중평균 등을 쓴다.
  ksa:
  - 501
  - 540
  kifrs:
  - 1002
  혼동주의:
  - 저가법은 원가흐름가정이 아니라 평가 기준
  - NRV 하락은 평가손실·충당금 검토 대상
- rule: 충당부채는 현재의무·자원유출 가능성·신뢰성 있는 추정을 충족할 때 인식, 우발부채는 공시 대상.
  ksa:
  - 501
  - 540
  kifrs:
  - 1037
  혼동주의:
  - 소송 존재만으로 충당부채 인식을 단정하지 말 것
  - 가능성 평가와 금액 추정 가능성을 함께 검토
- rule: 특수관계자 공시는 거래금액 외 채권·채무 잔액, 약정, 지급보증, 주요 경영진 보상까지 포함될 수 있다.
  ksa:
  - 550
  kifrs:
  - 1024
  혼동주의:
  - 연결실체 내부거래와 외부 특수관계자 거래를 구분
  - '''시장조건 거래'' 표현은 충분한 근거가 있을 때만'
- rule: 금융상품은 분류·측정(1109), 공시(1107), 공정가치 서열체계(1113)를 구분해 검토한다.
  ksa:
  - 315
  - 330
  - 540
  kifrs:
  - 1109
  - 1107
  - 1113
  혼동주의:
  - 공정가치 평가=1113, 분류·손상=1109, 공시=1107
- rule: 손상검사는 자산/현금창출단위의 장부금액과 회수가능액을 비교한다.
  ksa:
  - 540
  kifrs:
  - 1036
  혼동주의:
  - 영업권은 상각이 아니라 손상검사 대상
  - 회수가능액=사용가치와 순공정가치 중 큰 금액
- rule: 사업결합은 취득법 적용, 식별가능 자산·부채를 공정가치 측정, 영업권/염가매수차익 인식.
  ksa:
  - 540
  kifrs:
  - 1103
  혼동주의:
  - 자산취득과 사업결합을 구분
  - 조건부대가는 최초·후속 측정 기준을 별도 검토
- rule: 연결 여부는 지분율이 아니라 힘·변동이익 노출·연관성으로 지배력을 판단한다.
  ksa:
  - 600
  kifrs:
  - 1110
  - 1112
  혼동주의:
  - 지분율이 낮아도 계약상 의사결정권+변동이익 노출이면 지배력 검토
  - 구조화기업은 실질 지배력 판단이 중요
